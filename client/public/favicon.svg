<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0f172a"/>

  <!-- Clock circle -->
  <circle cx="32" cy="32" r="22" stroke="#3b82f6" stroke-width="3" fill="none"/>

  <!-- Clock tick marks (12, 3, 6, 9) -->
  <line x1="32" y1="12" x2="32" y2="16" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="32" x2="48" y2="32" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="32" y2="48" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="16" y2="32" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>

  <!-- Clock hour hand -->
  <line x1="32" y1="32" x2="32" y2="20" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Clock minute hand -->
  <line x1="32" y1="32" x2="42" y2="26" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#3b82f6"/>
</svg>
